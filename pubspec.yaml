name: optivus2
description: Optivus — AI-powered daily routine & habit optimisation app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

# ---------------------------------------------------------------------------
# Runtime dependencies
# ---------------------------------------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  http: ^1.6.0
  firebase_core: any
  firebase_app_check: any
  firebase_crashlytics: any
  firebase_remote_config: any
  firebase_storage: any
  go_router: ^17.1.0
  firebase_auth: any
  cloud_firestore: any
  flutter_spinkit: ^5.2.2
  just_audio: ^0.9.42
  audio_session: ^0.1.22
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  google_maps_flutter: ^2.17.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  image: ^4.2.0

  # IDs & crypto
  uuid: ^4.5.1
  crypto: ^3.0.6

  # Local persistence
  shared_preferences: ^2.3.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

# ---------------------------------------------------------------------------
# Development dependencies
# ---------------------------------------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  mock_exceptions: ^0.8.2

# ---------------------------------------------------------------------------
# Flutter configuration
# ---------------------------------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/audio/healing_432hz/
    - assets/audio/nature_sounds/
    - assets/audio/ambient_atmospheric/
