name: optivus2
description: Optivus — AI-powered daily routine & habit optimisation app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

# ---------------------------------------------------------------------------
# Runtime dependencies
# ---------------------------------------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  http: ^1.6.0
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  go_router: ^17.1.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  flutter_spinkit: ^5.2.2
  cloud_functions: ^6.2.0

# ---------------------------------------------------------------------------
# Development dependencies
# ---------------------------------------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ---------------------------------------------------------------------------
# Flutter configuration
# ---------------------------------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/
